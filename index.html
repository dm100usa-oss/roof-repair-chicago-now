<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="bingbot" content="noindex, nofollow" />
  <title>Roof Repair Chicago NOW</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      border-bottom: 1px solid #eeeeee;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #111111;
      user-select: none;
    }

    .logo .now {
      color: #e63946;
    }

    nav {
      display: flex;
      gap: 32px;
    }

    nav span {
      color: #666666;
      font-size: 15px;
      font-weight: 500;
      cursor: default;
      user-select: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .banner {
      background: #e63946;
      color: #ffffff;
      padding: 60px 80px;
      border-radius: 16px;
      text-align: center;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(230, 57, 70, 0.25);
    }

    .banner h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .banner p {
      font-size: 20px;
      font-weight: 400;
      opacity: 0.95;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #999999;
      font-size: 14px;
      border-top: 1px solid #eeeeee;
    }

    @media (max-width: 640px) {
      header {
        padding: 16px 20px;
        flex-direction: column;
        gap: 12px;
      }

      nav {
        gap: 20px;
      }

      nav span {
        font-size: 14px;
      }

      .banner {
        padding: 40px 24px;
      }

      .banner h1 {
        font-size: 30px;
      }

      .banner p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Roof Repair Chicago <span class="now">NOW</span></div>
    <nav>
      <span>Home</span>
      <span>About</span>
      <span>How we rank</span>
      <span>Top 10</span>
      <span>Contact</span>
    </nav>
  </header>

  <main>
    <div class="banner">
      <h1>Site under construction</h1>
      <p>Coming soon.</p>
    </div>
  </main>

  <footer>
    &copy; Roof Repair Chicago NOW
  </footer>
</body>
</html>
